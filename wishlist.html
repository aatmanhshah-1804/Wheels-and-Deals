<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wishlist | Wheels & Deals</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body onload="checkLogin(); loadWishlist()">

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container">
      <a class="navbar-brand fw-bold text-warning" href="home.html">
        Wheels & Deals
      </a>

      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="browse.html">Browse</a></li>
          <li class="nav-item"><a class="nav-link" href="sell.html">Sell</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item">
            <a class="nav-link active position-relative" href="wishlist.html">
              Wishlist
              <span id="wishlistCount"
                class="badge bg-danger text-white rounded-pill position-absolute top-0 start-100 translate-middle">
                0
              </span>
            </a>
          </li>
          <li class="nav-item">
            <button class="btn btn-danger ms-2" onclick="logout()">Logout</button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container my-5">
    <h2 class="text-center mb-4 slide-in-up">My Wishlist ❤️</h2>
    <div class="row" id="wishlistContainer"></div>
  </div>

  <footer class="bg-dark text-white text-center py-3 mt-5">
    © 2026 Wheels & Deals
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/wishlist.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
      const container = document.getElementById("wishlistContainer");

      if (wishlist.length === 0) {
        container.innerHTML = "<p class='text-center'>Your wishlist is empty.</p>";
        return;
      }

      wishlist.forEach((car, index) => {
        container.innerHTML += `
      <div class="col-md-4 mb-4">
        <div class="card shadow">
          <img src="${car.image}" class="card-img-top" style="height:200px;object-fit:cover;">
          <div class="card-body">
            <h5 class="card-title">${car.brand} ${car.model}</h5>
            <p class="card-text">
              ${car.year} • ${car.fuel}<br>
              <strong>$${car.price}</strong>
            </p>
            <button class="btn btn-danger w-100" onclick="removeFromWishlist(${index})">
              Remove
            </button>
          </div>
        </div>
      </div>
    `;
      });
    });

    function removeFromWishlist(index) {
      let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
      wishlist.splice(index, 1);
      localStorage.setItem("wishlist", JSON.stringify(wishlist));
      location.reload();
    }
  </script>
  <script src="js/auth.js"></script>


</body>

</html>
